spring.application.name=DbExamAPI

# Metadata database (override via env vars in other environments)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dbexam}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Schema is owned by Flyway migrations, never by Hibernate
spring.jpa.hibernate.ddl-auto=none

# Existing databases predate Flyway: baseline them at 0 so V1+ still apply
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT (defaults are dev-only; override both secrets in any real environment)
application.security.jwt.access-secret=${JWT_ACCESS_SECRET:g/oENMwDE7dPj1VLBZGVZA49KDvAyHF0tN3pC29VaEg=}
application.security.jwt.refresh-secret=${JWT_REFRESH_SECRET:bjhnjifEor64QaPKYAnnJbdlx7G8P4OgeYxllviZf28=}
application.security.jwt.access-expiration-minutes=30
application.security.jwt.refresh-expiration-days=30

# CORS
application.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
